<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="AvroraMU event details and registration."><title>Event Details | AvroraMU</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"></head><body><header data-navbar></header><main><div class="container mt-3" data-config-alert></div><section class="section-padding"><div class="container"><div data-page-alert></div><div id="eventDetails" aria-live="polite"></div><div id="eventActions" class="row g-4 mt-3 d-none"><div class="col-lg-5"><section class="card p-4 h-100"><h2 class="h4">Register your character</h2><div id="registrationAlert"></div><div id="registrationStatus"></div><form id="registrationForm"><div class="mb-3"><label class="form-label" for="characterName">Character name</label><input class="form-control" id="characterName" name="characterName" required minlength="3" maxlength="20" autocomplete="off"></div><div class="mb-3"><label class="form-label" for="characterClass">Character class</label><select class="form-select" id="characterClass" name="characterClass" required><option value="">Choose a class</option></select></div><button class="btn btn-gold" type="submit">Register for event</button></form></section></div><div class="col-lg-7"><section class="card p-4"><h2 class="h4">Community comments</h2><div id="commentAlert"></div><form id="commentForm" class="mb-4"><label class="form-label" for="commentContent">Add a comment</label><textarea class="form-control mb-2" id="commentContent" name="content" rows="3" maxlength="1000" required></textarea><button class="btn btn-outline-gold" type="submit">Post comment</button></form><div id="commentsList" aria-live="polite"></div></section></div></div></div></section></main><div data-footer></div><script type="module" src="/src/pages/event-details.js"></script></body></html>
