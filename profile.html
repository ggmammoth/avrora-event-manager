<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Profile | AvroraMU</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"></head><body><header data-navbar></header><main><div class="container mt-3" data-config-alert></div><section class="page-header"><div class="container"><p class="eyebrow">Account</p><h1>Your Profile</h1></div></section><section class="section-padding"><div class="container"><div data-page-alert></div><div id="profileContent" class="card p-4 p-md-5 d-none"><div class="row g-5"><div class="col-md-4 text-center"><img id="avatarPreview" class="avatar avatar-lg mb-3" alt="Profile avatar"><h2 id="profileName" class="h4"></h2><span id="profileRole" class="badge category-badge"></span></div><div class="col-md-8"><form id="profileForm"><div class="mb-3"><label class="form-label" for="fullName">Full name</label><input class="form-control" id="fullName" name="fullName" required minlength="2" maxlength="100"></div><div class="mb-3"><label class="form-label" for="email">Email address</label><input class="form-control" id="email" type="email" readonly disabled></div><div class="mb-4"><label class="form-label" for="avatar">Profile avatar</label><input class="form-control" id="avatar" name="avatar" type="file" accept="image/jpeg,image/png,image/webp,image/gif"><div class="form-text text-secondary">JPG, PNG, WebP, or GIF. Maximum 5 MB.</div></div><div class="d-flex flex-wrap gap-2"><button class="btn btn-gold" type="submit">Save profile</button><button class="btn btn-outline-light" id="logoutButton" type="button">Logout</button></div></form></div></div></div></div></section></main><div data-footer></div><script type="module" src="/src/pages/profile.js"></script></body></html>
