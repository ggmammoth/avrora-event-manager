<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Register | AvroraMU</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"></head><body><header data-navbar></header><main><div class="container"><div data-config-alert class="mt-3"></div><section class="auth-card card p-4 p-md-5"><p class="eyebrow">Begin your journey</p><h1 class="h2 mb-3">Create an account</h1><div id="authAlert" aria-live="polite"></div><form id="registerForm" novalidate><div class="mb-3"><label class="form-label" for="fullName">Full name</label><input class="form-control" id="fullName" name="fullName" autocomplete="name" required minlength="2" maxlength="100"></div><div class="mb-3"><label class="form-label" for="email">Email address</label><input class="form-control" id="email" name="email" type="email" autocomplete="email" required></div><div class="mb-3"><label class="form-label" for="password">Password</label><input class="form-control" id="password" name="password" type="password" autocomplete="new-password" minlength="8" required><div class="form-text text-secondary">At least 8 characters, including a letter and number.</div></div><div class="mb-4"><label class="form-label" for="confirmPassword">Confirm password</label><input class="form-control" id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required></div><button class="btn btn-gold w-100" type="submit">Create account</button></form><p class="text-center text-secondary mt-4 mb-0">Already registered? <a href="/login.html">Login</a></p></section></div></main><div data-footer></div><script type="module" src="/src/pages/register.js"></script></body></html>
