<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login | AvroraMU</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"></head><body><header data-navbar></header><main><div class="container"><div data-config-alert class="mt-3"></div><section class="auth-card card p-4 p-md-5"><p class="eyebrow">Welcome back</p><h1 class="h2 mb-3">Enter the realm</h1><p class="text-secondary">Sign in to manage registrations and join the conversation.</p><div id="authAlert" aria-live="polite"></div><form id="loginForm" novalidate><div class="mb-3"><label class="form-label" for="email">Email address</label><input class="form-control" id="email" name="email" type="email" autocomplete="email" required></div><div class="mb-4"><label class="form-label" for="password">Password</label><input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required></div><button class="btn btn-gold w-100" type="submit">Login</button></form><p class="text-center text-secondary mt-4 mb-0">New adventurer? <a href="/register.html">Create an account</a></p></section></div></main><div data-footer></div><script type="module" src="/src/pages/login.js"></script></body></html>
